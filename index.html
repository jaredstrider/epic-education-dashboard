<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>EPIC Imaging: Education Review</title>
<style>
  :root{
    --bg:#0A0C10; --surface:#141821; --surface2:#1c222e; --line:#28303f;
    --text:#E6EAF2; --text2:#9aa6bd; --text3:#5f6b82;
    --accent:#00C2FF; --amber:#FF6B35; --good:#33d69f; --warn:#FF6B35;
    --radius:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--text);font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  a{color:var(--accent)}
  button{font:inherit;cursor:pointer;border:none;border-radius:10px;padding:10px 16px;background:var(--accent);color:#00121b;font-weight:650}
  button.ghost{background:var(--surface2);color:var(--text)}
  button.ghost:hover{background:#242c3a}
  button:disabled{opacity:.5;cursor:not-allowed}
  input,textarea{font:inherit;background:var(--surface);border:1px solid var(--line);color:var(--text);border-radius:10px;padding:11px 13px;width:100%}
  input:focus,textarea:focus{outline:none;border-color:var(--accent)}
  .wrap{max-width:1100px;margin:0 auto;padding:24px}
  header.top{display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--line);padding:16px 24px;position:sticky;top:0;background:rgba(10,12,16,.9);backdrop-filter:blur(8px);z-index:10}
  .logo{display:flex;align-items:center;gap:10px;font-weight:700}
  .logo .dot{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--accent),#0077aa);display:grid;place-items:center;color:#00121b;font-size:14px}
  .spacer{flex:1}
  .muted{color:var(--text2)} .dim{color:var(--text3)}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px}
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;padding:4px 10px;border-radius:999px;background:var(--surface2);color:var(--text2)}
  .pill.pending{background:rgba(255,107,53,.14);color:var(--amber)}
  .grid{display:grid;gap:14px}
  /* login */
  .center{min-height:100vh;display:grid;place-items:center}
  .login{width:min(420px,92vw)}
  .login h1{font-size:22px;margin:0 0 4px}
  .login p{margin:0 0 20px;color:var(--text2)}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
  /* queue */
  .qitem{display:flex;gap:14px;align-items:center;cursor:pointer;transition:background .15s}
  .qitem:hover{background:var(--surface2)}
  .thumb{width:72px;height:72px;border-radius:10px;object-fit:cover;background:#000;flex:none}
  /* review */
  .review{display:grid;grid-template-columns:1.2fr .9fr;gap:20px}
  @media(max-width:880px){.review{grid-template-columns:1fr}}
  .imgwrap{position:relative;background:#000;border-radius:var(--radius);overflow:hidden;user-select:none}
  .imgwrap img{display:block;width:100%}
  .arrow{position:absolute;transform:translate(-50%,-100%);font-size:0;pointer-events:none}
  .arrow svg{filter:drop-shadow(0 1px 2px rgba(0,0,0,.6))}
  .arrow .num{position:absolute;top:-8px;left:14px;font-size:11px;font-weight:700;color:#fff;background:var(--accent);border-radius:999px;width:18px;height:18px;display:grid;place-items:center}
  .arrow.doc .num{background:var(--amber)}
  .legend{display:flex;gap:16px;margin-top:8px;font-size:12px;color:var(--text2)}
  .legend b{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:5px;vertical-align:middle}
  .rubric-row{display:flex;align-items:center;gap:10px;margin:10px 0}
  .rubric-row .lbl{flex:1;font-size:13px;color:var(--text2)}
  .scale{display:flex;gap:6px}
  .scale .s{width:26px;height:26px;border-radius:50%;border:1px solid var(--line);background:var(--surface);color:var(--text3);font-size:12px;font-weight:700;display:grid;place-items:center;cursor:pointer}
  .scale .s.on{background:var(--accent);color:#00121b;border-color:var(--accent)}
  .scale.doc .s.on{background:var(--amber);border-color:var(--amber);color:#fff}
  h3{margin:22px 0 8px;font-size:15px}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--line);padding:12px 18px;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.5);z-index:50}
  .hint{font-size:12px;color:var(--text3);margin-top:6px}
  .empty{text-align:center;color:var(--text3);padding:60px 0}
</style>
</head>
<body>
<div id="app"></div>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const SUPABASE_URL = 'https://swnncflzcpmtfzruuibx.supabase.co'
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN3bm5jZmx6Y3BtdGZ6cnV1aWJ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1ODI4NzAsImV4cCI6MjA5OTE1ODg3MH0.2jZuYYnofORfHwYd70H8rISRlqgjJewxbsuLtzu9JOw'
const sb = createClient(SUPABASE_URL, SUPABASE_ANON)

const CRITERIA = [
  ['probeHandling','Probe handling & orientation'],
  ['imageAcquisition','Image acquisition & optimization'],
  ['anatomyId','Anatomy identification'],
  ['pathology','Pathology recognition'],
  ['reasoning','Clinical reasoning'],
]
const app = document.getElementById('app')
const esc = s => (s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))
const imgURL = p => `${SUPABASE_URL}/storage/v1/object/public/submission-images/${p}`
let me = null, meName = null

function toast(msg){ const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2600) }

// ---------- Sign-in (identity) ----------
async function boot(){
  me = localStorage.getItem('epic_edu_email')
  meName = localStorage.getItem('epic_edu_name')
  if(me) renderQueue(); else renderLogin()
}
function renderLogin(){
  app.innerHTML = `<div class="center"><div class="login card">
    <h1>Education Review</h1>
    <p class="muted">Sign in to review and grade trainee ultrasound scans.</p>
    <div class="field"><label>Your name</label><input id="name" placeholder="e.g. Dr N. Educator" autocomplete="name"/></div>
    <div class="field"><label>Email</label><input id="email" type="email" placeholder="you@clinic.co.za" autocomplete="email"/></div>
    <button id="go" style="width:100%">Enter dashboard</button>
    <div class="hint">Your identity is recorded on every review you submit.</div>
  </div></div>`
  app.querySelector('#go').onclick = e=>{
    const name = app.querySelector('#name').value.trim()
    const addr = app.querySelector('#email').value.trim().toLowerCase()
    if(!name || !addr.includes('@')){ toast('Enter your name and a valid email.'); return }
    me = addr; meName = name
    localStorage.setItem('epic_edu_email', addr)
    localStorage.setItem('epic_edu_name', name)
    renderQueue()
  }
}
function signOut(){ localStorage.removeItem('epic_edu_email'); localStorage.removeItem('epic_edu_name'); me=null; renderLogin() }

// ---------- Queue ----------
function chrome(inner){
  return `<header class="top"><div class="logo"><span class="dot">◈</span> EPIC Imaging · Education</div>
    <div class="spacer"></div><span class="muted" style="font-size:13px">${esc(me)}</span>
    <button class="ghost" id="signout">Sign out</button></header>${inner}`
}
async function renderQueue(){
  app.innerHTML = chrome(`<div class="wrap"><div id="q"><div class="empty">Loading…</div></div></div>`)
  app.querySelector('#signout').onclick = signOut
  const { data:pending } = await sb.from('submissions').select('*').eq('status','pending').order('submitted_at',{ascending:true})
  const { count:reviewed } = await sb.from('submissions').select('*',{count:'exact',head:true}).eq('status','reviewed')
  const q = app.querySelector('#q')
  const head = `<div style="display:flex;align-items:center;gap:12px;margin-bottom:18px">
      <h2 style="margin:0;font-size:20px">Review queue</h2>
      <span class="pill pending">${(pending||[]).length} pending</span>
      <span class="pill">${reviewed||0} reviewed</span></div>`
  if(!pending || !pending.length){ q.innerHTML = head + `<div class="empty">🎉 Queue is clear. No scans awaiting review.</div>`; return }
  q.innerHTML = head + `<div class="grid">` + pending.map(s=>`
    <div class="card qitem" data-id="${s.id}">
      <img class="thumb" src="${imgURL(s.image_path)}" alt=""/>
      <div style="flex:1">
        <div style="font-weight:650">${esc(s.exam_type||'Ultrasound scan')}</div>
        <div class="muted" style="font-size:13px">${esc(s.nurse_name)} · ${new Date(s.submitted_at).toLocaleString()}</div>
      </div>
      <span class="pill pending">Pending</span>
    </div>`).join('') + `</div>`
  q.querySelectorAll('.qitem').forEach(el=> el.onclick = ()=> renderReview(pending.find(p=>p.id===el.dataset.id)))
}

// ---------- Review ----------
function arrowSVG(color){ return `<svg width="30" height="30" viewBox="0 0 30 30"><path d="M15 0 L9 12 L13 12 L13 30 L17 30 L17 12 L21 12 Z" fill="${color}"/></svg>` }
function drawArrows(container, arrows, cls, color){
  arrows.forEach(a=>{
    const d=document.createElement('div'); d.className='arrow '+cls
    d.style.left=(a.position.x*100)+'%'; d.style.top=(a.position.y*100)+'%'
    d.style.transform=`translate(-50%,-100%) rotate(${(a.angle||-Math.PI/2)+Math.PI/2}rad)`
    d.innerHTML=arrowSVG(color)+`<span class="num">${a.n}</span>`
    container.appendChild(d)
  })
}
function renderReview(s){
  const grade = { probeHandling:0,imageAcquisition:0,anatomyId:0,pathology:0,reasoning:0 }
  const docArrows = []
  app.innerHTML = chrome(`<div class="wrap">
    <button class="ghost" id="back" style="margin-bottom:16px">← Queue</button>
    <div class="review">
      <div>
        <div class="imgwrap" id="imgwrap"><img id="img" src="${imgURL(s.image_path)}" alt=""/></div>
        <div class="legend"><span><b style="background:var(--accent)"></b>Trainee arrows</span>
          <span><b style="background:var(--amber)"></b>Your arrows</span>
          <span class="dim">click the image to drop your own numbered arrow</span></div>
        <h3>Trainee: ${esc(s.nurse_name)}</h3>
        <div class="card"><div class="muted" style="font-size:13px;white-space:pre-wrap">${esc(s.self_note)||'<span class="dim">No note provided.</span>'}</div></div>
      </div>
      <div>
        <h3 style="margin-top:0">Your grade</h3>
        <div class="card" id="rubric"></div>
        <h3>Your annotations</h3>
        <div class="card" id="docnotes"><div class="dim" style="font-size:13px">Click the image to add arrows, then add a note for each below.</div></div>
        <h3>Comments to trainee</h3>
        <textarea id="comments" rows="4" placeholder="Overall feedback, what to work on…"></textarea>
        <button id="submit" style="width:100%;margin-top:14px">Submit review</button>
      </div>
    </div></div>`)
  app.querySelector('#signout').onclick = signOut
  app.querySelector('#back').onclick = renderQueue

  const wrap = app.querySelector('#imgwrap')
  const selfArrows = Array.isArray(s.nurse_arrows)? s.nurse_arrows : []
  const img = app.querySelector('#img')
  img.onload = ()=> drawArrows(wrap, selfArrows, 'self', getComputedStyle(document.documentElement).getPropertyValue('--accent'))

  // doctor arrow placement
  wrap.addEventListener('click', ev=>{
    if(ev.target.closest('.arrow')) return
    const r = wrap.getBoundingClientRect()
    const x=(ev.clientX-r.left)/r.width, y=(ev.clientY-r.top)/r.height
    if(x<0||x>1||y<0||y>1) return
    docArrows.push({ n:docArrows.length+1, position:{x,y}, angle:-Math.PI/2, note:'' })
    refreshDoc()
  })
  function refreshDoc(){
    wrap.querySelectorAll('.arrow.doc').forEach(e=>e.remove())
    drawArrows(wrap, docArrows, 'doc', getComputedStyle(document.documentElement).getPropertyValue('--amber'))
    const dn = app.querySelector('#docnotes')
    if(!docArrows.length){ dn.innerHTML='<div class="dim" style="font-size:13px">Click the image to add arrows, then add a note for each below.</div>'; return }
    dn.innerHTML = docArrows.map((a,i)=>`<div class="rubric-row">
      <span class="num" style="background:var(--amber);color:#fff;border-radius:999px;width:20px;height:20px;display:grid;place-items:center;font-size:11px;font-weight:700">${a.n}</span>
      <input data-i="${i}" class="docnote" placeholder="What is arrow ${a.n}?" value="${esc(a.note)}"/></div>`).join('')
    dn.querySelectorAll('.docnote').forEach(inp=> inp.oninput=()=> docArrows[inp.dataset.i].note=inp.value)
  }

  // rubric
  const rub = app.querySelector('#rubric')
  rub.innerHTML = CRITERIA.map(([k,label])=>`<div class="rubric-row"><span class="lbl">${label}</span>
    <div class="scale doc" data-k="${k}">${[1,2,3,4,5].map(n=>`<span class="s" data-n="${n}">${n}</span>`).join('')}</div></div>`).join('')
  rub.querySelectorAll('.scale').forEach(sc=> sc.querySelectorAll('.s').forEach(dot=> dot.onclick=()=>{
    const k=sc.dataset.k, n=+dot.dataset.n; grade[k]=n
    sc.querySelectorAll('.s').forEach(d=> d.classList.toggle('on', +d.dataset.n<=n))
  }))

  app.querySelector('#submit').onclick = async e=>{
    if(Object.values(grade).some(v=>v<1)){ toast('Score all five criteria first.'); return }
    e.target.disabled=true; e.target.textContent='Submitting…'
    const { error } = await sb.from('reviews').insert({
      submission_id:s.id, reviewer_email:me, rubric:grade,
      doctor_arrows:docArrows, comments:app.querySelector('#comments').value
    })
    if(error){ e.target.disabled=false; e.target.textContent='Submit review'; toast(error.message); return }
    toast('Review sent to '+s.nurse_name); renderQueue()
  }
}

boot()
</script>
</body>
</html>
